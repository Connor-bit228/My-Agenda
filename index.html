<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Agenda">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>My Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F4EF;--surf:#FFFFFF;--surf2:#F0EDE8;--surf3:#E8E4DC;
  --txt:#1A1A1A;--txt2:#4A4845;--muted:#8A8580;
  --bdr:#E8E3DB;--bdr2:#D8D3CB;
  --acc:#2D6A4F;--acc-l:#D8EFE3;--acc-m:#74C69D;
  --blue:#4A90D9;--blue-l:rgba(74,144,217,0.13);
  --red:#C1666B;--hol:#B8956A;--hol-l:#F5EDE0;
  --past-bg:#E4E0D8;
  --shd:0 2px 10px rgba(0,0,0,0.06);--shd-lg:0 8px 28px rgba(0,0,0,0.1);
  --r:12px;--rs:8px;--t:0.2s ease;
}
body.dark{
  --bg:#0E0E14;--surf:#1A1A24;--surf2:#22222E;--surf3:#2A2A3A;
  --txt:#E4E2DE;--txt2:#B8B6B2;--muted:#6A6875;
  --bdr:#2A2A38;--bdr2:#343444;
  --acc:#52B788;--acc-l:#1A3020;--acc-m:#2D6A4F;
  --blue:#5BA4E8;--blue-l:rgba(91,164,232,0.15);
  --red:#D9797E;--hol:#C4A07A;--hol-l:#2A2018;
  --past-bg:#10101A;
  --shd:0 2px 10px rgba(0,0,0,0.3);--shd-lg:0 8px 28px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;transition:background var(--t),color var(--t);}

/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--bdr);padding:11px 22px;display:flex;align-items:center;gap:8px;box-shadow:var(--shd);flex-wrap:wrap;position:sticky;top:0;z-index:50;transition:background var(--t),border-color var(--t);}
.logo{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;color:var(--acc);letter-spacing:-0.02em;flex-shrink:0;}
.wx{display:flex;align-items:center;gap:5px;background:var(--surf2);border:1px solid var(--bdr);border-radius:18px;padding:3px 10px;font-size:0.75rem;color:var(--txt2);}
.sync-row{display:flex;align-items:center;gap:4px;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--bdr);}
.sdot.ok{background:#52b788;}.sdot.busy{background:#C8A800;animation:pulse 1s infinite;}.sdot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.stxt{font-size:0.65rem;color:var(--muted);}
.vtabs{display:flex;gap:2px;background:var(--surf2);border-radius:9px;padding:3px;border:1px solid var(--bdr);}
.vt{padding:4px 12px;border-radius:6px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:0.73rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--t);touch-action:manipulation;white-space:nowrap;}
.vt.on{background:var(--surf);color:var(--acc);box-shadow:var(--shd);}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;}
.icon-btn{background:var(--surf2);border:1px solid var(--bdr);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;transition:all var(--t);color:var(--txt2);touch-action:manipulation;}
.icon-btn:hover{background:var(--acc-l);color:var(--acc);}
.leg{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:3px;font-size:0.65rem;color:var(--muted);}
.ld{width:7px;height:7px;border-radius:50%;}

/* LAYOUT */
.app{display:flex;flex:1;min-height:0;}
.main{flex:1;padding:18px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch;min-width:0;}

/* CAL HEADER */
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ch-lbl{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--txt);letter-spacing:-0.03em;}
.ch-yr{font-size:0.85rem;color:var(--muted);font-weight:300;margin-left:6px;}
.ch-nav{display:flex;gap:5px;align-items:center;}
.nb{background:var(--surf);border:1px solid var(--bdr);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;transition:all var(--t);color:var(--txt);touch-action:manipulation;}
.nb:hover{background:var(--acc);color:white;border-color:var(--acc);}
.tb{background:var(--surf);border:1px solid var(--bdr);padding:4px 12px;border-radius:16px;cursor:pointer;font-size:0.73rem;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--muted);transition:all var(--t);touch-action:manipulation;}
.tb:hover{background:var(--acc-l);color:var(--acc);}

/* WEEKDAY HEADERS */
.wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.wd{text-align:center;font-size:0.64rem;font-weight:600;color:var(--muted);padding:3px 0;letter-spacing:0.06em;text-transform:uppercase;}
.wd.we{color:var(--red);opacity:0.75;}

/* MONTH GRID — equal fixed-height cells */
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:110px;gap:3px;}
.dc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rs);padding:7px 6px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;display:flex;flex-direction:column;gap:2px;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
.dc.oth{opacity:0.22;}
.dc.past{background:var(--past-bg);border-color:color-mix(in srgb,var(--bdr) 60%,var(--past-bg));}
.dc.past .dn{color:var(--muted);}
.dc.past .ep{opacity:0.4;}
.dc.past:hover{border-color:var(--bdr2);box-shadow:none;}
.dc.tod{border:2px solid var(--blue);box-shadow:var(--blue-l) 0 0 0 3px;}
.dc.tod .dn{color:var(--blue);font-weight:700;}
.dc.sel:not(.tod){border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-l);}
.dc.hd{border-left:3px solid var(--hol);}
.dc.we:not(.tod) .dn{color:var(--red);}
.dc.past.we .dn{color:color-mix(in srgb,var(--red) 40%,var(--muted));}
.dn{font-size:0.78rem;font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border-radius:50%;}
.hml{font-size:0.52rem;color:var(--hol);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
.ep{font-size:0.6rem;border-radius:3px;padding:1px 4px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;background:var(--ecl,var(--acc-l));color:var(--ec,var(--acc));border-left:2px solid var(--ec,var(--acc));pointer-events:none;line-height:1.4;}
.em{font-size:0.56rem;color:var(--muted);padding-left:2px;pointer-events:none;}
.edots{display:none;gap:2px;margin-top:2px;flex-wrap:wrap;pointer-events:none;}
.edot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* YEAR VIEW */
.ygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.mm{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:10px;cursor:pointer;transition:all var(--t);touch-action:manipulation;}
.mm:hover{border-color:var(--acc-m);box-shadow:var(--shd);}
.mm-t{font-family:'Playfair Display',serif;font-size:0.78rem;font-weight:600;text-align:center;margin-bottom:6px;pointer-events:none;}
.mm-wd{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px;}
.mw{text-align:center;font-size:0.48rem;color:var(--muted);}
.mdays{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.md{text-align:center;font-size:0.55rem;padding:2px 0;border-radius:2px;line-height:1.7;cursor:pointer;touch-action:manipulation;}
.md.om{color:transparent;pointer-events:none;}.md.past{color:var(--muted);}
.md.tod{color:var(--blue);font-weight:700;}.md.hd2{color:var(--hol);}
.md.we{color:var(--red);}.md.past.we{color:color-mix(in srgb,var(--red) 35%,var(--muted));}
.md.has::after{content:'';display:block;width:3px;height:3px;border-radius:50%;background:var(--acc-m);margin:0 auto;margin-top:-2px;}

/* WEEK VIEW — equal fixed-height cards */
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:210px;gap:5px;}
.wc{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 7px;cursor:pointer;transition:all var(--t);display:flex;flex-direction:column;height:100%;overflow:hidden;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
.wc:hover:not(.tod){border-color:var(--acc-m);box-shadow:var(--shd);transform:translateY(-2px);}
.wc.past{background:var(--past-bg);}
.wc.past:hover{transform:none;box-shadow:none;border-color:var(--bdr);}
.wc.tod{border:2px solid var(--blue);box-shadow:var(--blue-l) 0 0 0 3px;}
.wc.sel:not(.tod){border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-l);}
.wc.hd{border-left:3px solid var(--hol);}
.wc-day{font-size:0.6rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;pointer-events:none;}
.wc-num{font-size:1.2rem;font-weight:700;color:var(--txt);line-height:1.1;pointer-events:none;}
.wc.tod .wc-num{color:var(--blue);}.wc.past .wc-num{color:var(--muted);}
.wc.we .wc-num{color:var(--red);}.wc.past.we .wc-num{color:color-mix(in srgb,var(--red) 40%,var(--muted));}
.wc-hd{font-size:0.54rem;color:var(--hol);pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.wc-evs{display:flex;flex-direction:column;align-items:flex-start;gap:2px;margin-top:5px;flex:1;overflow:hidden;pointer-events:none;}
.wc-ev{font-size:0.58rem;border-radius:3px;padding:2px 5px;font-weight:500;background:var(--ecl,var(--acc-l));color:var(--ec,var(--acc));border-left:2px solid var(--ec,var(--acc));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;align-self:stretch;}
.wc-ev-t{font-size:0.54rem;opacity:0.7;}
.wc-more{font-size:0.55rem;color:var(--muted);}
.wc-empty{font-size:0.58rem;color:var(--muted);font-style:italic;}

/* WEEK DAY DETAIL */
.dd{margin-top:12px;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 18px;}
.dd-t{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600;color:var(--txt);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.dd-hbadge{font-size:0.66rem;color:var(--hol);border-radius:4px;padding:2px 6px;border:1px solid var(--hol-l);background:var(--hol-l);}
.tl{display:flex;flex-direction:column;}
.tl-r{display:flex;align-items:stretch;min-height:36px;}
.tl-t{width:50px;font-size:0.6rem;color:var(--muted);padding-top:4px;text-align:right;padding-right:9px;flex-shrink:0;}
.tl-ln{width:1px;background:var(--bdr);flex-shrink:0;position:relative;}
.tl-ln::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--bdr);position:absolute;top:4px;left:-2px;}
.tl-b{flex:1;padding:2px 0 5px 11px;}
.tl-ev{background:var(--ecl,var(--acc-l));color:var(--ec,var(--acc));border-left:3px solid var(--ec,var(--acc));border-radius:4px;padding:4px 7px;margin-bottom:3px;font-size:0.7rem;}
.tl-ev-t{font-weight:600;}.tl-ev-n{font-size:0.62rem;opacity:0.7;margin-top:1px;}
.no-ev{font-size:0.74rem;color:var(--muted);font-style:italic;padding:5px 0;}

/* AGENDA VIEW */
.ag-wrap{display:flex;flex-direction:column;}
.ag-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.85rem;}
.ag-empty em{display:block;font-size:1.8rem;margin-bottom:8px;font-style:normal;}
.ag-grp{margin-bottom:2px;}
.ag-date{font-size:0.8rem;font-weight:700;color:var(--txt);text-transform:uppercase;letter-spacing:0.06em;padding:14px 0 5px;display:flex;align-items:center;gap:8px;}
.ag-date::after{content:'';flex:1;height:1px;background:var(--bdr);}
.ag-date.todlbl{color:var(--blue);}
.ag-hbadge{font-size:0.6rem;color:var(--hol);background:var(--hol-l);border-radius:4px;padding:1px 6px;font-weight:500;}
.ag-ev{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 11px;display:flex;align-items:center;gap:9px;margin-bottom:4px;cursor:pointer;transition:all var(--t);border-left:4px solid var(--ec,var(--acc));touch-action:manipulation;max-width:520px;}
.ag-ev:hover{box-shadow:var(--shd);transform:translateX(2px);}
.ag-ev-time{font-size:0.68rem;color:var(--muted);min-width:54px;font-weight:500;flex-shrink:0;}
.ag-ev-info{flex:1;min-width:0;}
.ag-ev-title{font-size:0.83rem;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-ev-note{font-size:0.67rem;color:var(--muted);}
.ag-ev-badge{font-size:0.58rem;font-weight:600;padding:1px 6px;border-radius:8px;background:var(--ecl,var(--acc-l));color:var(--ec,var(--acc));white-space:nowrap;flex-shrink:0;}
.ag-recur{font-size:0.58rem;color:var(--blue);background:var(--blue-l);border-radius:3px;padding:1px 4px;margin-left:4px;}

/* COUNTDOWNS */
.cd-sec{margin-bottom:18px;max-width:620px;}
.cd-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cd-hdr-t{font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
.cd-add{background:var(--acc);color:white;border:none;padding:4px 12px;border-radius:7px;font-size:0.7rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;touch-action:manipulation;}
.cd-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
.cd-card{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:10px;}
.cd-emoji{font-size:1.4rem;flex-shrink:0;}
.cd-info{flex:1;min-width:0;}
.cd-name{font-size:0.85rem;font-weight:600;color:var(--txt);margin-bottom:3px;}
.cd-days{font-size:1.3rem;font-weight:700;color:var(--acc);line-height:1;}
.cd-days span{font-size:0.68rem;font-weight:400;color:var(--muted);margin-left:3px;}
.cd-bar-w{height:4px;background:var(--bdr);border-radius:2px;margin-top:5px;}
.cd-bar{height:100%;border-radius:2px;background:var(--acc);transition:width 0.5s;}
.cd-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:4px;touch-action:manipulation;flex-shrink:0;}
.cd-del:hover{color:var(--red);}
.cd-form{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;display:flex;flex-direction:column;gap:8px;}
.cd-form input,.cd-form select{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.8rem;color:var(--txt);background:var(--surf);outline:none;-webkit-appearance:none;appearance:none;}
.cd-form input:focus,.cd-form select:focus{border-color:var(--acc);}
.cd-row{display:flex;gap:7px;}
.cd-row>*{flex:1;}
.cd-btns{display:flex;gap:7px;}
.cd-save{flex:1;background:var(--acc);color:white;border:none;padding:9px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;touch-action:manipulation;}
.cd-cancel{background:var(--surf);color:var(--muted);border:1px solid var(--bdr);padding:9px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.8rem;cursor:pointer;touch-action:manipulation;}
.cd-empty{font-size:0.75rem;color:var(--muted);padding:4px 0 10px;}

/* HABITS */
.hab-wrap{display:flex;flex-direction:column;gap:16px;}
.hab-hdr{display:flex;align-items:center;justify-content:space-between;}
.hab-title{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--txt);}
.hab-add{background:var(--acc);color:white;border:none;padding:7px 16px;border-radius:10px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;touch-action:manipulation;transition:all var(--t);}
.hab-add:hover{background:#1d5235;}
.hab-form{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:15px;display:flex;flex-direction:column;gap:9px;}
.hab-form input{width:100%;padding:9px 11px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--txt);background:var(--surf2);outline:none;transition:border-color var(--t);}
.hab-form input:focus{border-color:var(--acc);}
.hab-lbl{font-size:0.72rem;color:var(--muted);font-weight:600;}
.hab-em-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;}
.hab-em{font-size:1rem;cursor:pointer;text-align:center;padding:5px 3px;border-radius:5px;transition:background 0.1s;touch-action:manipulation;}
.hab-em:hover,.hab-em.on{background:var(--acc-l);outline:2px solid var(--acc);border-radius:5px;}
.hab-clr-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.hab-cs{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all var(--t);touch-action:manipulation;}
.hab-cs.on{border-color:var(--txt);transform:scale(1.15);}
.hab-btns{display:flex;gap:8px;}
.hab-save{flex:1;background:var(--acc);color:white;border:none;padding:9px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;touch-action:manipulation;}
.hab-cancel{background:var(--surf2);color:var(--muted);border:1px solid var(--bdr);padding:9px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.82rem;cursor:pointer;touch-action:manipulation;}
.hab-empty{text-align:center;padding:40px 20px;color:var(--muted);}
.hab-empty em{display:block;font-size:1.8rem;margin-bottom:8px;font-style:normal;}
.hab-row{background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:13px 15px;}
.hab-row-hd{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.hab-emoji{font-size:1.3rem;}
.hab-name{font-size:0.88rem;font-weight:600;color:var(--txt);flex:1;}
.hab-streak{font-size:0.7rem;font-weight:600;color:var(--acc);background:var(--acc-l);border-radius:7px;padding:2px 8px;}
.hab-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:3px;touch-action:manipulation;}
.hab-del:hover{color:var(--red);}
.hab-grid-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.hab-grid{display:flex;gap:3px;padding-bottom:2px;}
.hab-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;}
.hab-dl{font-size:0.48rem;color:var(--muted);height:12px;display:flex;align-items:center;}
.hab-c{width:18px;height:18px;border-radius:50%;border:2px solid var(--bdr);cursor:pointer;transition:all 0.15s;touch-action:manipulation;flex-shrink:0;}
.hab-c.done{border-color:transparent;}
.hab-c.today-r{box-shadow:0 0 0 2px var(--blue);}
.hab-c:hover{transform:scale(1.2);}

/* SIDEBAR */
.sb{width:280px;background:var(--surf);border-left:1px solid var(--bdr);padding:18px;display:flex;flex-direction:column;gap:16px;overflow-y:auto;transition:background var(--t);}
.sb-h{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:600;color:var(--txt);margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--bdr);}
.sb-lbl{font-size:0.72rem;color:var(--muted);margin-bottom:7px;}
.sb-form{display:flex;flex-direction:column;gap:7px;position:relative;}
.sb-form input,.sb-form textarea,.sb-form select{width:100%;padding:8px 10px;border:1px solid var(--bdr);border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.8rem;color:var(--txt);background:var(--surf2);outline:none;transition:border-color var(--t);-webkit-appearance:none;appearance:none;}

.r2{display:flex;gap:6px;}
.r2>*{flex:1;}
.eb-btn{background:var(--surf2);border:1px solid var(--bdr);border-radius:var(--rs);padding:0 9px;cursor:pointer;font-size:0.95rem;touch-action:manipulation;}
.ep-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surf);border:1px solid var(--bdr);border-radius:var(--r);padding:8px;box-shadow:var(--shd-lg);z-index:300;}
.ep-pop.open{display:block;}
.ep-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;}

.clr-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.clr-lbl{font-size:0.68rem;color:var(--muted);width:100%;}
.csc{width:22px;height:22px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all var(--t);touch-action:manipulation;position:relative;}
.csc.on{border-color:var(--txt);transform:scale(1.15);}
.csc::after{content:'';position:absolute;inset:0;font-size:0.5rem;color:white;display:flex;align-items:center;justify-content:center;}

.edit-ban{background:var(--blue-l);border:1px solid var(--blue);border-radius:var(--rs);padding:6px 9px;font-size:0.72rem;color:var(--blue);font-weight:500;display:none;}
.form-btns{display:flex;gap:6px;}
.btn-sv{flex:1;background:var(--acc);color:white;border:none;padding:8px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all var(--t);}

.btn-cn{background:var(--surf2);color:var(--muted);border:1px solid var(--bdr);padding:8px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:0.8rem;cursor:pointer;display:none;touch-action:manipulation;}
.ev-list{display:flex;flex-direction:column;gap:5px;}

.ev-inf{flex:1;min-width:0;}

.ev-tm{font-size:0.65rem;color:var(--muted);}
.ev-bdg{font-size:0.58rem;font-weight:600;padding:1px 5px;border-radius:7px;background:var(--ecl,var(--acc-l));color:var(--ec,var(--acc));white-space:nowrap;flex-shrink:0;align-self:center;}
.ev-acts{display:flex;gap:3px;flex-shrink:0;}
.ev-ed{background:var(--acc-l);border:none;cursor:pointer;color:var(--acc);font-size:0.62rem;font-weight:600;padding:2px 6px;border-radius:3px;font-family:'DM Sans',sans-serif;touch-action:manipulation;}
.ev-ed:hover{background:var(--acc);color:white;}
.ev-dl{background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.95rem;padding:2px 3px;touch-action:manipulation;}

.empty-s{font-size:0.74rem;color:var(--muted);font-style:italic;text-align:center;padding:8px 0;}

/* MOBILE SHEET */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;display:none;transition:opacity 0.25s;backdrop-filter:blur(2px);}
.sh-ov.on{opacity:1;pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surf);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -4px 30px rgba(0,0,0,0.2);}
.sheet.on{transform:translateY(0);}
.sh-hdl{width:34px;height:4px;background:var(--bdr);border-radius:2px;margin:10px auto 0;flex-shrink:0;}
.sh-head{padding:11px 18px 9px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sh-title{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:700;color:var(--txt);}
.sh-close{background:var(--surf2);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:0.9rem;color:var(--muted);display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.sh-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 18px 32px;flex:1;display:flex;flex-direction:column;gap:10px;}
.sh-hd-badge{font-size:0.78rem;color:var(--hol);font-weight:500;border-radius:7px;padding:6px 10px;border-left:3px solid var(--hol);background:var(--hol-l);}
.sh-ev-list{display:flex;flex-direction:column;gap:6px;}
.sh-ev{background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:9px 11px;display:flex;justify-content:space-between;align-items:flex-start;gap:7px;border-left:3px solid var(--ec,var(--acc-m));}
.sh-ev-inf{flex:1;min-width:0;}
.sh-ev-t{font-size:0.86rem;font-weight:600;color:var(--txt);margin-bottom:2px;}
.sh-ev-tm{font-size:0.71rem;color:var(--muted);}
.sh-ev-bdg{font-size:0.6rem;font-weight:600;padding:2px 6px;border-radius:8px;background:var(--ecl,var(--acc-l));color:var(--ec,var(--acc));white-space:nowrap;flex-shrink:0;}
.sh-ev-acts{display:flex;gap:5px;align-items:center;}
.sh-edit{background:var(--acc-l);border:none;cursor:pointer;color:var(--acc);font-size:0.7rem;font-weight:600;padding:4px 8px;border-radius:5px;font-family:'DM Sans',sans-serif;touch-action:manipulation;}
.sh-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:2px 4px;touch-action:manipulation;}
.sh-no-ev{font-size:0.84rem;color:var(--muted);text-align:center;padding:16px 0 5px;line-height:1.6;}
.sh-no-ev em{display:block;font-size:1.5rem;margin-bottom:6px;font-style:normal;}
.sh-form-t{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:600;color:var(--txt);}
.sh-edit-ban{background:var(--blue-l);border:1px solid var(--blue);border-radius:7px;padding:6px 10px;font-size:0.74rem;color:var(--blue);font-weight:500;}
.sh-form{display:flex;flex-direction:column;gap:9px;position:relative;}
.sh-form input,.sh-form textarea,.sh-form select{width:100%;padding:11px 12px;border:1px solid var(--bdr);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--txt);background:var(--surf2);outline:none;-webkit-appearance:none;appearance:none;}
.sh-form input:focus,.sh-form textarea:focus,.sh-form select:focus{border-color:var(--acc);}
.sh-form textarea{resize:none;height:58px;}
.sh-r2{display:flex;gap:7px;}
.sh-r2>*{flex:1;}
.sh-clr{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sh-clr-lbl{font-size:0.72rem;color:var(--muted);width:100%;}
.sh-cs{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all var(--t);touch-action:manipulation;position:relative;}
.sh-cs.on{border-color:var(--txt);transform:scale(1.15);}
.sh-cs::after{content:'';position:absolute;inset:0;font-size:0.6rem;color:white;display:flex;align-items:center;justify-content:center;}
.sh-cs.on::after{content:'\2713';}
.sh-btns{display:flex;gap:7px;}
.sh-save{flex:1;background:var(--acc);color:white;border:none;padding:12px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;touch-action:manipulation;}
.sh-save:active{transform:scale(0.97);}
.sh-cancel{background:var(--surf2);color:var(--muted);border:1px solid var(--bdr);padding:12px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;touch-action:manipulation;}

/* MOBILE NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surf);border-top:1px solid var(--bdr);padding:5px 0 max(5px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -1px 10px rgba(0,0,0,0.07);}
.mob-tabs{display:flex;justify-content:space-around;}
.mob-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 10px;border:none;background:none;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.58rem;font-weight:500;transition:color var(--t);touch-action:manipulation;}
.mob-tab.on{color:var(--acc);}
.mob-tab svg{width:20px;height:20px;}
.mob-dot{width:4px;height:4px;border-radius:50%;background:var(--acc);opacity:0;}
.mob-tab.on .mob-dot{opacity:1;}

/* FAB */
.fab{display:none;position:fixed;bottom:72px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--acc);color:white;border:none;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 16px rgba(45,106,79,0.4);z-index:99;align-items:center;justify-content:center;touch-action:manipulation;}
.fab:active{transform:scale(0.92);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal-bg.hidden{display:none;}
.modal{background:var(--surf);border-radius:var(--r);padding:20px;max-width:290px;width:100%;box-shadow:var(--shd-lg);}
.modal-t{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;margin-bottom:5px;}
.modal-b{font-size:0.78rem;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.modal-btns{display:flex;flex-direction:column;gap:6px;}
.m-btn{padding:9px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:0.8rem;font-weight:500;cursor:pointer;touch-action:manipulation;}
.m-one{background:var(--surf2);color:var(--txt);border:1px solid var(--bdr);}
.m-all{background:var(--red);color:white;}
.m-cancel{background:none;color:var(--muted);}

/* LOADER */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;}
.loader.gone{display:none;}
.spin{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-t{font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--muted);}

/* TOAST */
.toast-el{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:white;padding:8px 16px;border-radius:9px;font-size:0.78rem;font-family:'DM Sans',sans-serif;z-index:600;box-shadow:var(--shd-lg);white-space:nowrap;pointer-events:none;}

/* RESPONSIVE */
@media(max-width:768px){
  header{padding:10px 13px;gap:6px;}
  .logo{font-size:1.05rem;}
  header .sub,.leg{display:none;}
  .vtabs{display:none;}
  .wx{display:none;}
  .main{padding:9px 9px 75px;}
  .sb{display:none;}
  .mob-nav{display:block;}
  .sh-ov{display:block;}
  .fab{display:flex;}
  .ch-lbl{font-size:1.2rem;}
  /* MONTH — fill screen height */
  .dgrid{grid-auto-rows:calc((100svh - 165px) / 6);gap:2px;}
  .dc{border-radius:6px;padding:4px;}
  .dc .hml,.dc .ep,.dc .em{display:none;}
  .edots{display:flex;}
  .dn{font-size:0.74rem;width:22px;height:22px;}
  .dc.tod .dn{background:var(--blue);color:white;}
  /* YEAR */
  .ygrid{grid-template-columns:repeat(2,1fr);gap:8px;}
  /* WEEK — fill screen, cards are rows */
  .wgrid{grid-template-columns:1fr;grid-auto-rows:auto;gap:5px;}
  .wc{flex-direction:row;align-items:center;padding:11px 13px;gap:10px;height:auto;min-height:60px;overflow:visible;}
  .wc-day{font-size:0.62rem;width:24px;text-align:center;flex-shrink:0;}
  .wc-num{font-size:1.4rem;width:36px;text-align:center;flex-shrink:0;}
  .wc-evs{flex-direction:row;flex-wrap:wrap;margin-top:0;flex:1;gap:3px;align-items:center;overflow:visible;}
  .wc-ev{font-size:0.6rem;padding:2px 5px;}
  .wc-empty{font-size:0.62rem;}
  /* AGENDA */
  .ag-ev{max-width:100%;}
}
@media(min-width:769px){
  .sh-ov,.sheet,.mob-nav,.fab{display:none!important;}
  .sb{display:flex;}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>

<body>
<div class="loader" id="loader"><div class="spin"></div><div class="loader-t">Loading your agenda...</div></div>

</div>

<header>

    <button class="vt" id="vt-week" onclick="setView('week')">Week</button>

      <div class="li"><div class="ld" style="background:#F5940A"></div>Orange</div>

<div class="app">

      <div class="ev-list" id="evList"><div class="empty-s">No day selected</div></div>
    </div>
  </div>
</div>

<div class="sh-ov" id="shOv" onclick="closeSheet()"></div>

  </div>
</nav>
<script>
// CONFIG
const DB='https://calendar-4b1de-default-rtdb.europe-west1.firebasedatabase.app/events';

// HOLIDAYS
function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31)-1,da=((h+l-7*m+114)%31)+1;return new Date(y,mo,da);}
const HC={};
function getHols(y){if(HC[y])return HC[y];const e=easter(y),ad=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};const kg=new Date(y,3,27).getDay()===0?new Date(y,3,26):new Date(y,3,27);HC[y]={[dk(new Date(y,0,1))]:'Nieuwjaarsdag',[dk(ad(e,-2))]:'Goede Vrijdag',[dk(e)]:'Eerste Paasdag',[dk(ad(e,1))]:'Tweede Paasdag',[dk(kg)]:'Koningsdag',[dk(new Date(y,4,5))]:'Bevrijdingsdag',[dk(ad(e,39))]:'Hemelvaartsdag',[dk(ad(e,49))]:'Eerste Pinksterdag',[dk(ad(e,50))]:'Tweede Pinksterdag',[dk(new Date(y,11,25))]:'Eerste Kerstdag',[dk(new Date(y,11,26))]:'Tweede Kerstdag'};return HC[y];}
function dk(dt){return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());}
function fk(y,m,d){return y+'-'+p2(m+1)+'-'+p2(d);}
function p2(n){return String(n).padStart(2,'0');}
function getHol(y,m,d){return getHols(y)[fk(y,m,d)]||null;}

const NOW=new Date(),TY=NOW.getFullYear(),TM=NOW.getMonth(),TD=NOW.getDate();
function isPast(y,m,d){return new Date(y,m,d)<new Date(TY,TM,TD);}
function isToday(y,m,d){return y===TY&&m===TM&&d===TD;}
function toMon(j){return(j+6)%7;}
function fmtDay(y,m,d){return WD[toMon(new Date(y,m,d).getDay())]+', '+MONTHS[m]+' '+d+', '+y;}

function sortEvs(a){return[...a].sort((x,y)=>(!x.start&&!y.start)?0:!x.start?1:!y.start?-1:x.start.localeCompare(y.start));}

function getFireAt(ev,key){
  if(!ev.reminder||ev.reminder==='none')return null;
  const[y,mo,d]=key.split('-').map(Number);
  if(ev.reminder==='custom'){if(!ev.reminderTime)return null;const[rh,rm]=ev.reminderTime.split(':').map(Number);return new Date(y,mo-1,d,rh,rm,0,0);}
  if(!ev.start)return null;
  const[eh,em]=ev.start.split(':').map(Number);const et=new Date(y,mo-1,d,eh,em,0,0);
  const off={'15min':15,'1hr':60,'1day':1440,'1week':10080};return new Date(et.getTime()-(off[ev.reminder]||0)*60000);
}

}

}

mo=document.createElement('div');mo.className='wc-more';mo.textContent='+'+(evs.length-5)+' more';ew.appendChild(mo);}}wc.appendChild(ew);cards.appendChild(wc);}p.appendChild(cards);if(SEL&&!isMob()){const sd=new Date(SEL.y,SEL.m,SEL.d),ws2=new Date(CWS),we2=new Date(CWS);we2.setDate(we2.getDate()+6);if(sd>=ws2&&sd<=we2)renderDD(p);}}
function renderDD(container){const{y,m,d}=SEL,evs=sortEvs(EV[fk(y,m,d)]||[]),hol=getHol(y,m,d);const panel=document.createElement('div');panel.className='dd';const tEl=document.createElement('div');tEl.className='dd-t';tEl.textContent=fmtDay(y,m,d);if(hol){const hb=document.createElement('span');hb.className='dd-hbadge';hb.textContent='🇳🇱 '+hol;tEl.appendChild(hb);}panel.appendChild(tEl);if(!evs.length){const nm=document.createElement('div');nm.className='no-ev';nm.textContent='No events on this day.';panel.appendChild(nm);container.appendChild(panel);return;}const bH={};evs.forEach(ev=>{const h=ev.start?parseInt(ev.start):null;const k=(h!==null)?String(h):'all';if(!bH[k])bH[k]=[];bH[k].push(ev);});const tl=document.createElement('div');tl.className='tl';if(bH.all){const row=document.createElement('div');row.className='tl-r';const tt=document.createElement('div');tt.className='tl-t';tt.textContent='All day';const ln=document.createElement('div');ln.className='tl-ln';const co=document.createElement('div');co.className='tl-b';bH.all.forEach(ev=>{const cm=C[ev.color]||C.green;const el=document.createElement('div');el.className='tl-ev';el.style.setProperty('--ec',cm.h);el.style.setProperty('--ecl',cm.l);const t=document.createElement('div');t.className='tl-ev-t';t.textContent=ev.title;el.appendChild(t);if(ev.note){const n=document.createElement('div');n.className='tl-ev-n';n.textContent=ev.note;el.appendChild(n);}co.appendChild(el);});row.appendChild(tt);row.appendChild(ln);row.appendChild(co);tl.appendChild(row);}const hrs=Object.keys(bH).filter(k=>k!=='all').map(Number).sort((a,b)=>a-b);hrs.forEach(h=>{const row=document.createElement('div');row.className='tl-r';const tt=document.createElement('div');tt.className='tl-t';tt.textContent=p2(h)+':00';const ln=document.createElement('div');ln.className='tl-ln';const co=document.createElement('div');co.className='tl-b';bH[String(h)].forEach(ev=>{const cm=C[ev.color]||C.green;const el=document.createElement('div');el.classNa // AGENDA
function rAgenda(){
  const p=document.getElementById('mainPanel');p.innerHTML='';
  const h=document.createElement('div');h.className='ch';const pl=document.createElement('span');pl.className='ch-lbl';pl.textContent='Upcoming';h.appendChild(pl);p.appendChild(h);
  // COUNTDOWNS
  const cdSec=document.createElement('div');cdSec.className='cd-sec';
  const cdH=document.createElement('div');cdH.className='cd-hdr';cdH.innerHTML='<span class="cd-hdr-t">&#9200; Countdowns</span>';
  const cdBtn=document.createElement('button');cdBtn.className='cd-add';cdBtn.textContent='+ Add';cdBtn.onclick=()=>{SHOW_CD_F=!SHOW_CD_F;rAgenda();};cdH.appendChild(cdBtn);cdSec.appendChild(cdH);
  if(SHOW_CD_F){
    const form=document.createElement('div');form.className='cd-form';
    const ni=document.createElement('input');ni.type='text';ni.placeholder='Name (e.g. ✈️ Holiday)';
    const row=document.createElement('div');row.className='cd-row';
    const di=document.createElement('input');di.type='date';di.min=fk(TY,TM,TD);
    const rs=document.createElement('select');[{v:'none',t:'No reminder'},{v:'1week',t:'1 week before'},{v:'48h',t:'48 hrs before'},{v:'24h',t:'24 hrs before'},{v:'1h',t:'1 hour before'}].forEach(({v,t})=>{const o=document.createElement('option');o.value=v;o.textContent=t;rs.appendChild(o);});
    row.appendChild(di);row.appendChild(rs);
    const btns=document.createElement('div');btns.className='cd-btns';
    const sv=document.createElement('button');sv.className='cd-save';sv.textContent='Save';
    sv.onclick=()=>{const name=ni.value.trim();if(!name||!di.value){alert('Fill in all fields.');return;}const id='cd_'+Date.now();CDS[id]={name,targetDate:di.value,reminder:rs.value,createdAt:fk(TY,TM,TD)};if(rs.value!=='none')storeCdRem(CDS[id],id);saveCDS();SHOW_CD_F=false;rAgenda();toast('&#9200; Countdown added!');};
    const cn=document.createElement('button');cn.className='cd-cancel';cn.textContent='Cancel';cn.onclick=()=>{SHOW_CD_F=false;rAgenda();};
    btns.appendChild(cn);btns.appendChild(sv);form.appendChild(ni);form.appendChild(row);form.appendChild(btns);cdSec.appendChild(form);
  }
  const cdItems=Object.entries(CDS||{}).sort((a,b)=>a[1].targetDate.localeCompare(b[1].targetDate));
  if(cdItems.length){
    const cdList=document.createElement('div');cdList.className='cd-list';
    cdItems.forEach(([id,cd])=>{
      const target=new Date(cd.targetDate+'T00:00:00'),today=new Date(TY,TM,TD);
      const diff=Math.ceil((target-today)/864e5);if(diff<-1)return;
      const card=document.createElement('div');card.className='cd-card';
      const em=document.createElement('div');em.className='cd-emoji';em.textContent='🎯';
      const inf=document.createElement('div');inf.className='cd-info';
      const nm=document.createElement('div');nm.className='cd-name';nm.textContent=cd.name;
      const dy=document.createElement('div');dy.className='cd-days';
      if(diff<=0){dy.textContent='Today! 🎉';dy.style.color='var(--red)';}else dy.innerHTML=diff+'<span>'+(diff===1?'day left':'days left')+'</span>';
      const created=cd.createdAt?new Date(cd.createdAt+'T00:00:00'):new Date(target.getTime()-30*864e5);
      const total=Math.max(1,(target-created)/864e5),elapsed=Math.max(0,(today-created)/864e5);
      const bw=document.createElement('div');bw.className='cd-bar-w';const bar=document.createElement('div');bar.className='cd-bar';bar.style.width=Math.min(100,Math.round(elapsed/total*100))+'%';bw.appendChild(bar);
      inf.appendChild(nm);inf.appendChild(dy);inf.appendChild(bw);
      const del=document.createElement('button');del.className='cd-del';del.innerHTML='&times;';del.onclick=()=>{delete CDS[id];saveCDS();rAgenda();};
      card.appendChild(em);card.appendChild(inf);card.appendChild(del);cdList.appendChild(card);
    });
    cdSec.appendChild(cdList);
  } else if(!SHOW_CD_F){const em=document.createElement('div');em.className='cd-empty';em.textContent='No countdowns — add one above!';cdSec.appendChild(em);}
  p.appendChild(cdSec);
  // EVENTS
  const wrap=document.createElement('div');wrap.className='ag-wrap';const now=new Date(TY,TM,TD);let hasAny=false;
  for(let i=0;i<=90;i++){
    const dt=new Date(now);dt.setDate(now.getDate()+i);const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate();
    if(isPast(y,m,d)&&!isToday(y,m,d))continue;
    const key=fk(y,m,d),evs=sortEvs(EV[key]||[]),hol=getHol(y,m,d);if(!evs.length&&!hol)continue;hasAny=true;
    const grp=document.createElement('div');grp.className='ag-grp';const isT=isToday(y,m,d);
    const lbl=document.createElement('div');lbl.className='ag-date'+(isT?' todlbl':'');lbl.textContent=isT?'Today':WD[toMon(dt.getDay())]+', '+MONTHS[m]+' '+d;
    if(hol){const hb=document.createElement('span');hb.className='ag-hbadge';hb.textContent='NL '+hol;lbl.appendChild(hb);}grp.appendChild(lbl);
    evs.forEach(ev=>{const cm=C[ev.color]||C.green;const item=document.createElement('div');item.className='ag-ev';item.style.setProperty('--ec',cm.h);item.style.setProperty('--ecl',cm.l);const te=document.createElement('div');te.className='ag-ev-time';te.textContent=ev.start?(ev.end?ev.start+'-'+ev.end:ev.start):'All day';const inf=document.createElement('div');inf.className='ag-ev-info';const tt=document.createElement('div');tt.className='ag-ev-title';tt.textContent=ev.title;if(ev.recurId){const rb=document.createElement('span');rb.className='ag-recur';rb.textContent='↺';tt.appendChild(rb);}inf.appendChild(tt);if(ev.note){const no=document.createElement('div');no.className='ag-ev-note';no.textContent=ev.note;inf.appendChild(no);}const bdg=document.createElement('div');bdg.className='ag-ev-badge';bdg.style.setProperty('--ec',cm.h);bdg.style.setProperty('--ecl',cm.l);bdg.textContent=cm.n;item.appendChild(te);item.appendChild(inf);item.appendChild(bdg);item.addEventListener('click',()=>selDay(y,m,d));grp.appendChild(item);});
    wrap.appendChild(grp);
  }
  if(!hasAny){const em=document.createElement('div');em.className='ag-empty';em.innerHTML='<em>📭</em>No upcoming events.<br>Add some to your calendar!';wrap.appendChild(em);}
  p.appendChild(wrap);
}

    const cn=document.createElement('button');cn.className='hab-cancel';cn.textContent='Cancel';cn.onclick=()=>{SHOW_HAB_F=false;rHabits();};

    const str=document.createElement('div');str.className='hab-streak';str.textContent='🔥 '+streak+(streak===1?' day':' days');
    const del=document.createElement('button');del.className='hab-del';del.innerHTML='&times;';del.onclick=()=>{if(confirm('Delete "'+hab.name+'"?')){delete HABS[id];saveHabs();rHabits();}};

    const gw=document.createElement('div');gw.className='hab-grid-wrap';const grid=document.createElement('div');grid.className='hab-grid';
    for(let i=29;i>=0;i--){
      const dt=new Date(TY,TM,TD-i);const k=fk(dt.getFullYear(),dt.getMonth(),dt.getDate());const done=!!(hab.completions&&hab.completions[k]);

      const lbl2=document.createElement('div');lbl2.className='hab-dl';if(i===0)lbl2.textContent='T';else if(i%7===0)lbl2.textContent=String(dt.getDate());

      circle.onclick=(()=>{const k2=k,hid=id;return()=>{if(!HABS[hid].completions)HABS[hid].completions={};if(HABS[hid].completions[k2])delete HABS[hid].completions[k2];else HABS[hid].completions[k2]=true;saveHabs();rHabits();};})();
      col2.appendChild(lbl2);col2.appendChild(circle);grid.appendChild(col2);
    }
    gw.appendChild(grid);row.appendChild(gw);wrap.appendChild(row);
  });
  p.appendChild(wrap);

function openAddSheet(y,m,d,editIdx){if(y===undefined){if(SEL){y=SEL.y;m=SEL.m;d=SEL.d;}else{y=TY;m=TM;d=TD;}}const key=fk(y,m,d),isEdit=editIdx!==undefined,ev2=isEdit?(EV[key]?.[editIdx]||{}):{};document.getElementById('shTitle').textContent=isEdit?'Edit Event':'New — '+fmtDay(y,m,d);const body=document.getElementById('shBody');body.innerHTML='';const ft=document.createElement('div');ft.className='sh-form-t';ft.textContent=isEdit?'Edit Event':'Add Event';body.appendChild(ft);if(isEdit){const ban=document.createElement('div');ban.className='sh-edit-ban';ban.textContent='Make your changes below';body.appendChild(ban);}const form=document.createElement('div');form.className='sh-form';const tr=document.createElement('div');tr.className='sh-r2';const inp=document.createElement('input');inp.type='text';inp.placeholder='Event title *';inp.value=isEdit?(ev2.title||''):'';inp.style.flex='1';const epBtn=document.createElement('button');epBtn.type='button';epBtn.className='sh-em-btn';epBtn.innerHTML='&#128515;';epBtn.style.cssText='background:var(--surf2);border:1px solid var(--bdr);border-radius:9px;padding:0 13px;cursor:pointer;font-size:1.05rem;touch-action:manipulation;flex-shrink:0;';const ep=document.createElement('div');ep.className='ep-pop sh-ep';ep.style.cssText='position:relative;top:0;width:100%;';epBtn.addEventListener('click',e=>{e.stopPropagation();ep.classList.toggle('open');if(ep.classList.contains('open')&&!ep.children.length){const g=document.createElement('div');g.className='ep-grid';EMOJIS.forEach(em=>{const b=document.createElement('div');b.className='ep-e';b.textContent=em;b.addEventListener('click',ex=>{ex.stopPropagation();inp.value+=em;inp.focus();ep.classList.remove('open');});g.appendChild(b);});ep.appendChild(g);}});tr.appendChild(inp);tr.appendChild(epBtn);form.appendChild(tr);form.appendChild(ep);const trow=document.createElement('div');trow.className='sh-r2';const ts=document.createElement('input');ts.type='time';ts.value=isEdit?(ev2.start||''):'';const te=document.createElement('input');te.type='time';te.value=isEdit?(ev2.end||''):'';trow.appendChild(ts);trow.appendChild(te);form.appendChild(trow);const tn=document.createElement('textarea');tn.placeholder='Note (optional)';tn.value=isEdit?(ev2.note||''):'';form.appendChild(tn);const repSel=document.createElement('select');['none','daily','weekly','monthly','yearly'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v==='none'?'No repeat':v.charAt(0).toUpperCase()+v.slice(1);if(isEdit&&ev2.repeat===v)o.selected=true;repSel.appendChild(o);});form.appendChild(repSel);const remSel=document.createElement('select');[{v:'none',t:'No reminder'},{v:'15min',t:'15 min before'},{v:'1hr',t:'1 hr before'},{v:'1day',t:'1 day before'},{v:'1week',t:'1 week before'},{v:'custom',t:'Custom time...'}].forEach(({v,t})=>{const o=document.createElement('option');o.value=v;o.textContent=t;if(isEdit&&ev2.reminder===v)o.selected=true;remSel.appendChild(o);});form.appendChild(remSel);const remT=document.createElement('input');remT.type='time';remT.value=isEdit?(ev2.reminderTime||''):'';remT.style.display=(isEdit&&ev2.reminder==='custom')?'block':'none';remSel.addEventListener('change',()=>{remT.style.display=remSel.value==='custom'?'block':'none';});form.appendChild(remT);const cr=document.createElement('div');cr.className='sh-clr';const cl=document.createElement('div');cl.className='sh-clr-lbl';cl.textContent='Colour';cr.appendChild(cl);const curC=isEdit?(ev2.color||'red'):'red';SELC=curC;Object.entries(C).forEach(([k,v])=>{const sw=document.createElement('div');sw.className='sh-cs'+(k===curC?' on':'');sw.style.background=v.h;sw.dataset.c=k;sw.addEventListener('click',()=>{document.querySelectorAll('.sh-cs').forEach(s=>s.classList.remove('on'));sw.classList.add('on');SELC=k;});cr.appendChild(sw);});form.appendChild(cr);const btns=document.createElement('div');btns.className='sh-btns';if(isEdit){const canc=document.createElement('button');canc.type='button';canc.className='sh-cancel';canc.textContent='Cancel';canc.addEventListener('click',()=>{closeSheet();openSheet(y,m,d);});btns.appendChild(canc);}const sub=document.createElement('button');sub.type='button';sub.className='sh-save';sub.textContent=isEdit?'Save Changes':'+ Add Event';sub.addEventListener('click',()=>{const t=inp.value.trim();if(!t){alert('Please enter a title.');return;}if(!EV[key])EV[key]=[];const obj={title:t,start:ts.value,end:te.value,note:tn.value.trim(),color:SELC,repeat:repSel.value,reminder:remSel.value,reminderTime:remSel.value==='custom'?remT.value:''};if(isEdit){EV[key][editIdx]=obj;}else{saveEv(key,obj);}storeRem(obj,key);save();closeSheet();render();openSheet(y,m,d);});btns.appendChild(sub);form.appendChild(btns);body.appendChild(form);document.getElementById('shOv').classList.add('on');document.getElementById('sheet').classList.add('on');document.body.style.overflow='hidden';setTimeout(()=>{try{inp.focus();}catch(e){}},400);}
function closeSheet(){document.getElementById('shOv').classList.remove('on');document.getElementById('sheet').classList.remove('on');document.body.style.overflow='';}

// DESKTOP SIDEBAR
function renderSB(){if(!SEL)return;const{y,m,d}=SEL,key=fk(y,m,d),dayEvs=sortEvs(EV[key]||[]),list=document.getElementById('evList');list.innerHTML='';const hol=getHol(y,m,d);if(hol){const hn=document.createElement('div');hn.className='hdn';hn.textContent='🇳🇱 '+hol;list.appendChild(hn);}if(!dayEvs.length){const es=document.createElement('div');es.className='empty-s';es.textContent='No events — add one!';list.appendChild(es);return;}dayEvs.forEach(ev=>{const origIdx=EV[key].indexOf(ev);const cm=C[ev.color]||C.green;const item=document.createElement('div');item.className='ev-item';item.style.setProperty('--ec',cm.h);item.style.setProperty('--ecl',cm.l);const inf=document.createElement('div');inf.className='ev-inf';const tt=document.createElement('div');tt.className='ev-t';if(ev.recurId){const ri=document.createElement('span');ri.style.cssText='font-size:0.58rem;color:var(--blue);background:var(--blue-l);border-radius:3px;padding:1px 4px;margin-right:3px;';ri.textContent='↺';tt.appendChild(ri);}tt.appendChild(document.createTextNode(ev.title));const tm=document.createElement('div');tm.className='ev-tm';let ts=ev.start?(ev.end?ev.start+'-'+ev.end:ev.start):'All day';if(ev.note)ts+='  ·  '+ev.note;tm.textContent=ts;inf.appendChild(tt);inf.appendChild(tm);const bdg=document.createElement('div');bdg.className='ev-bdg';bdg.style.setProperty('--ec',cm.h);bdg.style.setProperty('--ecl',cm.l);bdg.textContent=cm.n;const acts=document.createElement('div');acts.className='ev-acts';const eb=document.createElement('button');eb.className='ev-ed';eb.textContent='Edit';eb.addEventListener('click',e=>{e.stopPropagation();startEdit(key,origIdx);});const db=document.createElement('button');db.className='ev-dl';db.innerHTML='&times;';db.addEventListener('click',e=>{e.stopPropagation();delEv(key,origIdx);});acts.appendChild(eb);acts.appendChild(db);item.appendChild(inf);item.appendChild(bdg);item.appendChild(acts);list.appendChild(item);});}
function startEdit(key,idx){const ev=EV[key][idx];EK=key;EI=idx;document.getElementById('eTitle').value=ev.title;document.getElementById('eStart').value=ev.start||'';document.getElementById('eEnd').value=ev.end||'';document.getElementById('eNote').value=ev.note||'';document.getElementById('eRep').value=ev.repeat||'none';document.getElementById('eRem').value=ev.reminder||'none';tRT(ev.reminder||'none','deskRT');document.getElementById('deskRT').value=ev.reminderTime||'';document.querySelectorAll('.csc').forEach(s=>s.classList.toggle('on',s.dataset.c===ev.color));SELC=ev.color||'green';document.getElementById('sbH').textContent='Edit Event';document.getElementById('editBan').style.display='block';document.getElementById('btnCN').style.display='block';document.getElementById('btnSV').textContent='Save Changes';document.getElementById('eTitle').focus();document.querySelector('.sb').scrollTop=0;}
function cancelEdit(){EK=null;EI=null;document.getElementById('sbH').textContent='Add Event';document.getElementById('editBan').style.display='none';document.getElementById('btnCN').style.display='none';document.getElementById('btnSV').textContent='+ Add Event';['eTitle','eStart','eEnd','eNote'].forEach(id=>document.getElementById(id).value='');document.getElementById('eRep').value='none';document.getElementById('eRem').value='none';tRT('none','deskRT');document.getElementById('deskRT').value='';}
function submitDesk(){
  if(EK!==null&&EI!==null){const t=document.getElementById('eTitle').value.trim();if(!t){alert('Enter a title.');return;}const rv=document.getElementById('eRem').value;EV[EK][EI]={...EV[EK][EI],title:t,start:document.getElementById('eStart').value,end:document.getElementById('eEnd').value,note:document.getElementById('eNote').value.trim(),color:SELC,repeat:document.getElementById('eRep').value,reminder:rv,reminderTime:rv==='custom'?(document.getElementById('deskRT').value||''):''};storeRem(EV[EK][EI],EK);save();cancelEdit();render();renderSB();return;}
  if(!SEL){alert('Select a day first.');return;}const t=document.getElementById('eTitle').value.trim();if(!t){alert('Enter a title.');return;}const key=fk(SEL.y,SEL.m,SEL.d),rv=document.getElementById('eRem').value;const obj={title:t,start:document.getElementById('eStart').value,end:document.getElementById('eEnd').value,note:document.getElementById('eNote').value.trim(),color:SELC,repeat:document.getElementById('eRep').value,reminder:rv,reminderTime:rv==='custom'?(document.getElementById('deskRT').value||''):''};saveEv(key,obj);storeRem(obj,key);save();cancelEdit();render();renderSB();
}
