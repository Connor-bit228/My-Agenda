<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Agenda">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>My Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===== VARIABLES ===== */
:root{
  --bg:#F7F4EF;--surface:#FFFFFF;--surface2:#F0EDE8;
  --text:#1A1A1A;--text2:#4A4845;--muted:#8A8580;
  --border:#E8E3DB;--border2:#D8D3CB;
  --accent:#2D6A4F;--accent-l:#D8EFE3;--accent-m:#74C69D;
  --blue:#4A90D9;--blue-l:rgba(74,144,217,0.12);
  --red:#C1666B;--holiday:#B8956A;--holiday-l:#F5EDE0;
  --shadow:0 2px 12px rgba(0,0,0,0.06);--shadow-lg:0 8px 32px rgba(0,0,0,0.1);
  --radius:12px;--radius-sm:8px;
  --trans:0.2s ease;
}
body.dark{
  --bg:#0E0E14;--surface:#1A1A24;--surface2:#22222E;
  --text:#E4E2DE;--text2:#B8B6B2;--muted:#6A6875;
  --border:#2A2A38;--border2:#343444;
  --accent:#52B788;--accent-l:#1A3020;--accent-m:#2D6A4F;
  --blue:#5BA4E8;--blue-l:rgba(91,164,232,0.15);
  --red:#D9797E;--holiday:#C4A07A;--holiday-l:#2A2018;
  --shadow:0 2px 12px rgba(0,0,0,0.3);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background var(--trans),color var(--trans);}

/* ===== HEADER ===== */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);flex-wrap:wrap;position:sticky;top:0;z-index:50;transition:background var(--trans),border-color var(--trans);}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--accent);letter-spacing:-0.02em;}
.header-center{display:flex;align-items:center;gap:8px;margin-left:auto;}
.weather-widget{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:0.78rem;color:var(--text2);transition:background var(--trans),border-color var(--trans);}
.weather-icon{font-size:1rem;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background 0.3s;}
.sync-dot.ok{background:#52b788;}.sync-dot.busy{background:#C8A800;animation:pulse 1s infinite;}.sync-dot.err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.view-tabs{display:flex;gap:3px;background:var(--surface2);border-radius:10px;padding:3px;border:1px solid var(--border);}
.view-tab{padding:5px 13px;border-radius:7px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--trans);touch-action:manipulation;white-space:nowrap;}
.view-tab.active{background:var(--surface);color:var(--accent);box-shadow:var(--shadow);}
.icon-btn{background:var(--surface2);border:1px solid var(--border);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all var(--trans);color:var(--text2);touch-action:manipulation;flex-shrink:0;}
.icon-btn:hover{background:var(--accent-l);color:var(--accent);border-color:var(--accent-m);}
.legend{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:3px;font-size:0.68rem;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

/* ===== LAYOUT ===== */
.app{display:flex;flex:1;overflow:hidden;}
.main-panel{flex:1;padding:20px 24px;min-width:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ===== VIEW TRANSITION ===== */
.view-wrap{transition:opacity 0.18s ease,transform 0.18s ease;}
.view-wrap.out{opacity:0;transform:translateY(6px);}

/* ===== CAL HEADER ===== */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.period-label{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--text);letter-spacing:-0.03em;}
.year-label{font-size:0.9rem;color:var(--muted);font-weight:300;margin-left:7px;}
.nav-row{display:flex;gap:6px;align-items:center;}
.nav-btn{background:var(--surface);border:1px solid var(--border);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all var(--trans);color:var(--text);touch-action:manipulation;}
.nav-btn:hover{background:var(--accent);color:white;border-color:var(--accent);}
.today-btn{background:var(--surface);border:1px solid var(--border);padding:5px 13px;border-radius:18px;cursor:pointer;font-size:0.76rem;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--muted);transition:all var(--trans);touch-action:manipulation;}
.today-btn:hover{background:var(--accent-l);color:var(--accent);}

/* ===== WEEKDAYS ===== */
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;}
.wd{text-align:center;font-size:0.68rem;font-weight:600;color:var(--muted);padding:4px 0;letter-spacing:0.06em;text-transform:uppercase;}
.wd.we{color:var(--red);opacity:0.7;}

/* ===== MONTH GRID ===== */
.days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);min-height:72px;padding:6px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s,background 0.15s;display:flex;flex-direction:column;gap:2px;touch-action:manipulation;user-select:none;-webkit-user-select:none;position:relative;}
.dc:hover:not(.today){border-color:var(--accent-m);box-shadow:0 2px 8px rgba(45,106,79,0.12);}
.dc.other{opacity:0.25;}
.dc.past{background:var(--surface2);}
.dc.past .dn{color:var(--muted);}
.dc.past .ep{opacity:0.45;}
.dc.past:hover{border-color:var(--border2);box-shadow:none;}
.dc.today{border:2px solid var(--blue);box-shadow:var(--blue-l) 0 0 0 3px;}
.dc.today .dn{color:var(--blue);font-weight:700;text-shadow:0 0 10px rgba(74,144,217,0.5);}
.dc.sel:not(.today){border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-l);}
.dc.hday{border-left:3px solid var(--holiday);}
.dc.we:not(.today) .dn{color:var(--red);}
.dc.past.we .dn{color:color-mix(in srgb,var(--red) 50%,var(--muted));}
.dn{font-size:0.8rem;font-weight:500;width:24px;height:24px;display:flex;align-items:center;justify-content:center;pointer-events:none;border-radius:50%;flex-shrink:0;}
.hm{font-size:0.54rem;color:var(--holiday);font-weight:500;opacity:0.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
.ep{font-size:0.62rem;border-radius:3px;padding:1px 5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;background:var(--ecl,var(--accent-l));color:var(--ec,var(--accent));border-left:2px solid var(--ec,var(--accent));pointer-events:none;line-height:1.4;}
.em{font-size:0.58rem;color:var(--muted);font-weight:500;padding-left:2px;pointer-events:none;}
.edots{display:none;gap:3px;margin-top:2px;flex-wrap:wrap;pointer-events:none;}
.edot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ===== YEAR GRID ===== */
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.mm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all var(--trans);touch-action:manipulation;}
.mm:hover{border-color:var(--accent-m);box-shadow:var(--shadow);}
.mm-title{font-family:'Playfair Display',serif;font-size:0.82rem;font-weight:600;color:var(--text);margin-bottom:7px;text-align:center;pointer-events:none;}
.mm-wd{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px;}
.mm-w{text-align:center;font-size:0.5rem;color:var(--muted);font-weight:500;pointer-events:none;}
.mm-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.md{text-align:center;font-size:0.58rem;padding:2px 1px;border-radius:2px;color:var(--text);line-height:1.7;cursor:pointer;touch-action:manipulation;}
.md.om{color:transparent;pointer-events:none;}
.md.past{color:var(--muted);}
.md.today{color:var(--blue);font-weight:700;text-shadow:0 0 6px rgba(74,144,217,0.5);}
.md.hday{color:var(--holiday);font-weight:500;}
.md.we{color:var(--red);}
.md.past.we{color:color-mix(in srgb,var(--red) 40%,var(--muted));}
.md.has-ev{position:relative;}
.md.has-ev::after{content:'';display:block;width:3px;height:3px;border-radius:50%;background:var(--accent-m);margin:0 auto;margin-top:-2px;}

/* ===== WEEK CARDS ===== */
.wk-cards{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.wc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 7px;cursor:pointer;transition:all var(--trans);display:flex;flex-direction:column;gap:4px;min-height:150px;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
.wc:hover:not(.today){border-color:var(--accent-m);box-shadow:var(--shadow);transform:translateY(-2px);}
.wc.past{background:var(--surface2);}
.wc.past:hover{transform:none;box-shadow:none;border-color:var(--border);}
.wc.today{border:2px solid var(--blue);box-shadow:var(--blue-l) 0 0 0 3px;}
.wc.sel:not(.today){border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-l);}
.wc.hday{border-left:3px solid var(--holiday);}
.wc-day{font-size:0.64rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;pointer-events:none;}
.wc-num{font-size:1.3rem;font-weight:700;color:var(--text);line-height:1;pointer-events:none;}
.wc.today .wc-num{color:var(--blue);text-shadow:0 0 10px rgba(74,144,217,0.5);}
.wc.past .wc-num{color:var(--muted);}
.wc.we .wc-num{color:var(--red);}
.wc.past.we .wc-num{color:color-mix(in srgb,var(--red) 40%,var(--muted));}
.wc-hday{font-size:0.56rem;color:var(--holiday);font-weight:500;pointer-events:none;}
.wc-evs{display:flex;flex-direction:column;gap:2px;margin-top:4px;flex:1;pointer-events:none;}
.wc-ev{font-size:0.6rem;border-radius:3px;padding:2px 5px;font-weight:500;background:var(--ecl,var(--accent-l));color:var(--ec,var(--accent));border-left:2px solid var(--ec,var(--accent));white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wc-ev-t{font-size:0.56rem;opacity:0.7;}
.wc-more{font-size:0.58rem;color:var(--muted);padding-left:2px;}
.wc-empty{font-size:0.62rem;color:var(--muted);font-style:italic;margin-top:4px;}

/* ===== WEEK DETAIL ===== */
.day-detail{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;}
.dd-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dd-hday{font-size:0.7rem;color:var(--holiday);border-radius:4px;padding:2px 7px;font-weight:500;border:1px solid var(--holiday-l);background:var(--holiday-l);}
.tl{display:flex;flex-direction:column;}
.tl-row{display:flex;align-items:stretch;min-height:38px;}
.tl-t{width:52px;font-size:0.63rem;color:var(--muted);padding-top:5px;flex-shrink:0;text-align:right;padding-right:10px;}
.tl-line{width:1px;background:var(--border);flex-shrink:0;position:relative;}
.tl-line::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--border);position:absolute;top:5px;left:-3px;}
.tl-body{flex:1;padding:3px 0 5px 12px;}
.tl-ev{background:var(--ecl,var(--accent-l));color:var(--ec,var(--accent));border-left:3px solid var(--ec,var(--accent));border-radius:4px;padding:4px 8px;margin-bottom:3px;font-size:0.72rem;}
.tl-ev-title{font-weight:600;}
.tl-ev-note{font-size:0.65rem;opacity:0.7;margin-top:1px;}
.no-ev{font-size:0.76rem;color:var(--muted);font-style:italic;padding:6px 0;}

/* ===== AGENDA VIEW ===== */
.agenda-wrap{display:flex;flex-direction:column;gap:0;}
.agenda-empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:0.88rem;}
.agenda-empty span{display:block;font-size:2rem;margin-bottom:10px;}
.ag-group{margin-bottom:4px;}
.ag-date{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:12px 0 4px;display:flex;align-items:center;gap:10px;}
.ag-date::after{content:'';flex:1;height:1px;background:var(--border);}
.ag-date.today-lbl{color:var(--blue);}
.ag-hday{font-size:0.62rem;color:var(--holiday);background:var(--holiday-l);border-radius:4px;padding:1px 6px;font-weight:500;}
.ag-ev{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:flex-start;gap:10px;margin-bottom:5px;cursor:pointer;transition:all var(--trans);border-left:4px solid var(--ec,var(--accent));touch-action:manipulation;}
.ag-ev:hover{box-shadow:var(--shadow);transform:translateX(2px);}
.ag-ev.past-ev{opacity:0.5;}
.ag-ev-bar{width:4px;border-radius:2px;background:var(--ec,var(--accent));align-self:stretch;flex-shrink:0;display:none;}
.ag-ev-time{font-size:0.7rem;color:var(--muted);min-width:60px;font-weight:500;padding-top:1px;flex-shrink:0;}
.ag-ev-info{flex:1;min-width:0;}
.ag-ev-title{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ag-ev-note{font-size:0.7rem;color:var(--muted);}
.ag-ev-badge{font-size:0.6rem;font-weight:600;padding:1px 7px;border-radius:9px;background:var(--ecl,var(--accent-l));color:var(--ec,var(--accent));white-space:nowrap;flex-shrink:0;align-self:center;}
.ag-recur{font-size:0.6rem;color:var(--blue);background:var(--blue-l);border-radius:4px;padding:1px 5px;display:inline-block;margin-left:5px;}

/* ===== SIDEBAR ===== */
.sidebar{width:290px;background:var(--surface);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;transition:background var(--trans),border-color var(--trans);}
.sb-h{font-family:'Playfair Display',serif;font-size:0.95rem;font-weight:600;color:var(--text);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.sb-lbl{font-size:0.76rem;color:var(--muted);margin-bottom:8px;}
.sb-form{display:flex;flex-direction:column;gap:8px;position:relative;}
.sb-form input,.sb-form textarea,.sb-form select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--text);background:var(--surface2);outline:none;transition:border-color var(--trans),background var(--trans);-webkit-appearance:none;appearance:none;}
.sb-form input:focus,.sb-form textarea:focus,.sb-form select:focus{border-color:var(--accent);background:var(--surface);}
.sb-form textarea{resize:none;height:50px;}
.row2{display:flex;gap:7px;}
.row2>*{flex:1;}
.eb-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;cursor:pointer;font-size:1rem;transition:all var(--trans);touch-action:manipulation;flex-shrink:0;}
.ep-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow-lg);z-index:300;}
.ep-pop.open{display:block;}
.ep-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;}
.ep-e{font-size:1.05rem;cursor:pointer;text-align:center;padding:4px;border-radius:5px;transition:background 0.1s;touch-action:manipulation;}
.ep-e:hover{background:var(--surface2);}
.clr-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.clr-lbl{font-size:0.7rem;color:var(--muted);width:100%;margin-bottom:1px;}
.cs{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all var(--trans);position:relative;touch-action:manipulation;}
.cs.on{border-color:var(--text);transform:scale(1.15);}
.cs::after{content:'';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.55rem;color:white;opacity:0;font-weight:700;}
.cs.on::after{content:'\2713';opacity:1;}
.edit-banner{background:var(--blue-l);border:1px solid var(--blue);border-radius:var(--radius-sm);padding:7px 10px;font-size:0.74rem;color:var(--blue);font-weight:500;display:none;}
.form-btns{display:flex;gap:7px;}
.btn-save{flex:1;background:var(--accent);color:white;border:none;padding:9px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all var(--trans);touch-action:manipulation;}
.btn-save:hover{background:#1d5235;transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,106,79,0.3);}
.btn-cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:9px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;display:none;touch-action:manipulation;}
.ev-list{display:flex;flex-direction:column;gap:6px;}
.ev-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:6px;border-left:3px solid var(--ec,var(--accent-m));}
.ev-info{flex:1;min-width:0;}
.ev-title{font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{font-size:0.68rem;color:var(--muted);}
.ev-badge{font-size:0.6rem;font-weight:600;padding:1px 6px;border-radius:8px;background:var(--ecl,var(--accent-l));color:var(--ec,var(--accent));white-space:nowrap;flex-shrink:0;align-self:center;}
.ev-acts{display:flex;gap:3px;flex-shrink:0;}
.ev-edit{background:var(--accent-l);border:none;cursor:pointer;color:var(--accent);font-size:0.65rem;font-weight:600;padding:3px 7px;border-radius:4px;font-family:'DM Sans',sans-serif;touch-action:manipulation;transition:all var(--trans);}
.ev-edit:hover{background:var(--accent);color:white;}
.ev-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:2px 4px;border-radius:3px;touch-action:manipulation;transition:color var(--trans);}
.ev-del:hover{color:var(--red);}
.empty-s{font-size:0.76rem;color:var(--muted);font-style:italic;text-align:center;padding:10px 0;}
.hday-notice{font-size:0.76rem;color:var(--holiday);font-weight:500;background:var(--holiday-l);border-radius:6px;padding:7px 10px;border-left:3px solid var(--holiday);}

/* ===== MOBILE SHEET ===== */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;opacity:0;pointer-events:none;display:none;transition:opacity 0.25s;backdrop-filter:blur(2px);}
.sh-ov.on{opacity:1;pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -4px 40px rgba(0,0,0,0.2);}
.sheet.on{transform:translateY(0);}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0;flex-shrink:0;}
.sh-head{padding:12px 20px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.sh-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--text);}
.sh-close{background:var(--surface2);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1rem;color:var(--muted);display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.sh-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 20px 36px;flex:1;display:flex;flex-direction:column;gap:12px;}

<script>
// ===== CONFIG =====
const DB_URL='https://calendar-4b1de-default-rtdb.europe-west1.firebasedatabase.app/events';
const FB_SUBS='https://calendar-4b1de-default-rtdb.europe-west1.firebasedatabase.app/subscriptions';
const FB_REMS='https://calendar-4b1de-default-rtdb.europe-west1.firebasedatabase.app/reminders';
const VAPID_PUB='BD_soVz3PSl-kp9yzey3AK9Kgx7dzn-boW4iOQmTyuxjvPZoVG8BsVnbrJxjCWxj7T0YbN5ej_o6WfnwVHhmT_U';

// ===== EMOJIS =====
const EMOJIS=['📅','📆','⏰','🔔','✅','❌','🎯','💼','🏥','🏋️','🎉','🎂','✈️','🏖️','📚','💊','🍽️','🛒','📞','💰','🎵','🏠','🚗','💪','🌟','⭐','🔥','💡','📝','🎈','🎁','🌿','☀️','🌙','🤝','🎓','💻','🔑','🗓️','🧘','🏃','🍀','💤','📊','🎨','🚀','🌈','🍕','☕','🎮'];

// ===== CONSTANTS =====
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const WE_COLS=[5,6];
const COLOR={
  red:{h:'#E05252',l:'#FDEAEA',n:'Urgent'},orange:{h:'#E08B3A',l:'#FEF0DF',n:'High'},
  yellow:{h:'#C8A800',l:'#FFF9D6',n:'Medium'},green:{h:'#2D8A55',l:'#DFF2E8',n:'Normal'},
  blue:{h:'#2F72C4',l:'#DDEEFF',n:'Work'},purple:{h:'#7B52C8',l:'#EDE5FB',n:'Personal'}
};

// ===== HOLIDAYS =====
function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31)-1,da=((h+l-7*m+114)%31)+1;return new Date(y,mo,da);}
const HC={};
function getHols(y){
  if(HC[y])return HC[y];
  const e=easter(y),ad=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
  const kg=new Date(y,3,27).getDay()===0?new Date(y,3,26):new Date(y,3,27);
  HC[y]={[y+'-01-01']:'Nieuwjaarsdag',[dfk(ad(e,-2))]:'Goede Vrijdag',[dfk(e)]:'Eerste Paasdag',[dfk(ad(e,1))]:'Tweede Paasdag',[dfk(kg)]:'Koningsdag',[y+'-05-05']:'Bevrijdingsdag',[dfk(ad(e,39))]:'Hemelvaartsdag',[dfk(ad(e,49))]:'Eerste Pinksterdag',[dfk(ad(e,50))]:'Tweede Pinksterdag',[y+'-12-25']:'Eerste Kerstdag',[y+'-12-26']:'Tweede Kerstdag'};
  return HC[y];
}
function dfk(dt){return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function fk(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
function pad(n){return String(n).padStart(2,'0');}
function getHol(y,m,d){return getHols(y)[fk(y,m,d)]||null;}

// ===== DATE UTILS =====
const NOW=new Date(),TY=NOW.getFullYear(),TM=NOW.getMonth(),TD=NOW.getDate();
function isPast(y,m,d){return new Date(y,m,d)<new Date(TY,TM,TD);}
function isToday(y,m,d){return y===TY&&m===TM&&d===TD;}
function toMon(j){return(j+6)%7;}
function fmtDay(y,m,d){return WD[toMon(new Date(y,m,d).getDay())]+', '+MONTHS[m]+' '+d+', '+y;}
function isMob(){return window.innerWidth<=768;}
function sortEvs(arr){return[...arr].sort((a,b)=>{if(!a.start&&!b.start)return 0;if(!a.start)return 1;if(!b.start)return -1;return a.start.localeCompare(b.start);});}

// ===== STATE =====
let CY=TY,CM=TM,CWS=null,SEL=null,SELC='red',VIEW='month';
let EK=null,EI=null,isSaving=false,notifOk=false,pendingDel=null;
let EV={};
let sseSrc=null;
let renderTimer=null;

// ===== DARK MODE =====
function toggleDark(){
  document.body.classList.toggle('dark');
  localStorage.setItem('darkMode',document.body.classList.contains('dark')?'1':'0');
  document.getElementById('darkBtn').textContent=document.body.classList.contains('dark')?'☀️':'🌙';
}
if(localStorage.getItem('darkMode')==='1'){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='☀️';}

// ===== WEATHER =====
async function loadWeather(){
  try{
    const res=await fetch('https://api.open-meteo.com/v1/forecast?latitude=51.77&longitude=5.52&current=temperature_2m,weather_code&timezone=Europe/Amsterdam&forecast_days=1');
    const d=await res.json();

function startSSE(){
  if(sseSrc)sseSrc.close();
  sseSrc=new EventSource(DB_URL+'.json');
  sseSrc.addEventListener('put',e=>{
    try{
      const msg=JSON.parse(e.data);
      if(!msg||!msg.data||typeof msg.data!=='object')return;
      if(isSaving)return;
      if(JSON.stringify(msg.data)===JSON.stringify(EV))return;
      EV=msg.data;
      localStorage.setItem('agEvV4',JSON.stringify(EV));
      setSync('ok','Synced');
      // Debounce render
      clearTimeout(renderTimer);
      renderTimer=setTimeout(()=>{render();if(SEL&&!isMob())renderSidebar();},300);
    }catch(ex){}
  });
  sseSrc.onerror=()=>setSync('err','Disconnected');
}

function b64u(s){const r=atob(s.replace(/-/g,'+').replace(/_/g,'/'));return Uint8Array.from(r,c=>c.charCodeAt(0));}
async function initNotifs(){
  if(!('serviceWorker' in navigator)||!('PushManager' in window))return;
  if(Notification.permission==='default')showNotifBanner();
  else if(Notification.permission==='granted'){notifOk=true;await doSubscribe();}
}
function showNotifBanner(){
  if(document.getElementById('notifBanner'))return;
  const b=document.createElement('div');b.id='notifBanner';
  b.style.cssText='position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--accent);color:white;padding:11px 16px;border-radius:12px;font-size:0.8rem;font-family:DM Sans,sans-serif;z-index:500;display:flex;align-items:center;gap:9px;box-shadow:var(--shadow-lg);max-width:92vw;';

  btn.onclick=async()=>{const p=await Notification.requestPermission();notifOk=(p==='granted');b.remove();if(notifOk)doSubscribe();};
  const x=document.createElement('button');x.textContent='✕';x.style.cssText='background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;font-size:0.95rem;padding:0 3px;touch-action:manipulation;';
  x.onclick=()=>b.remove();
  b.appendChild(btn);b.appendChild(x);document.body.appendChild(b);
  setTimeout(()=>{if(b.parentNode)b.remove();},14000);
}
async function doSubscribe(){
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:b64u(VAPID_PUB)});
    const k=btoa(sub.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-20);
    await fetch(FB_SUBS+'/'+k+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(sub.toJSON())});
    notifOk=true;
  }catch(e){console.log('Push subscribe failed:',e.message);}
}
function getFireTime(ev,key){
  if(!ev.reminder||ev.reminder==='none')return null;
  const[y,mo,d]=key.split('-').map(Number);
  if(ev.reminder==='custom'){if(!ev.reminderTime)return null;const[rh,rm]=ev.reminderTime.split(':').map(Number);return new Date(y,mo-1,d,rh,rm,0,0);}
  if(!ev.start)return null;
  const[eh,em]=ev.start.split(':').map(Number);
  const et=new Date(y,mo-1,d,eh,em,0,0);
  const off={'15min':15,'1hr':60,'1day':1440,'1week':10080};
  return new Date(et.getTime()-(off[ev.reminder]||0)*60000);
}
async function storeReminder(ev,key){
  const ft=getFireTime(ev,key);
  if(!ft||ft<=Date.now())return;
  const id=key+'_'+ev.title.replace(/\W/g,'').slice(0,8)+'_'+ft.getTime();
  const[,mo,d]=key.split('-').map(Number);
  const tStr=ev.start?' at '+ev.start:'';
  await fetch(FB_REMS+'/'+id+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'📅 '+ev.title,body:MONTHS[mo-1]+' '+d+tStr+(ev.note?' — '+ev.note:''),fireAt:ft.getTime()})}).catch(()=>{});
}

// ===== RECURRING =====
function genDates(key,rep,count){
  const[y,m,d]=key.split('-').map(Number),dates=[],dt=new Date(y,m-1,d);
  for(let i=0;i<count;i++){
    dates.push(dfk(new Date(dt)));
    if(rep==='daily')dt.setDate(dt.getDate()+1);
    else if(rep==='weekly')dt.setDate(dt.getDate()+7);
    else if(rep==='monthly')dt.setMonth(dt.getMonth()+1);
    else if(rep==='yearly')dt.setFullYear(dt.getFullYear()+1);
    else break;
  }
  return dates;
}
function saveEv(key,obj){
  const rep=obj.repeat||'none';
  if(rep==='none'){if(!EV[key])EV[key]=[];EV[key].push({...obj});return 1;}
  const rid='rec_'+Date.now(),counts={daily:60,weekly:26,monthly:12,yearly:5};
  const dates=genDates(key,rep,counts[rep]||1);
  dates.forEach(dk=>{if(!EV[dk])EV[dk]=[];EV[dk].push({...obj,recurId:rid,repeat:'none'});});
  toast('&#8635; '+dates.length+' '+rep+' events created!');
  return dates.length;
}
function delEv(key,idx){
  const ev=EV[key][idx];
  if(ev.recurId){pendingDel={key,idx,rid:ev.recurId};document.getElementById('delModal').classList.remove('hidden');}
  else doDel1(key,idx);
}
function doDel1(key,idx){EV[key].splice(idx,1);if(!EV[key].length)delete EV[key];save();render();if(SEL&&!isMob())renderSidebar();}
function doDelAll(rid){Object.keys(EV).forEach(k=>{EV[k]=(EV[k]||[]).filter(e=>e.recurId!==rid);if(!EV[k].length)delete EV[k];});save();render();if(SEL&&!isMob())renderSidebar();}
document.getElementById('mDelOne').onclick=()=>{if(pendingDel)doDel1(pendingDel.key,pendingDel.idx);document.getElementById('delModal').classList.add('hidden');if(SEL&&isMob())openSheet(SEL.y,SEL.m,SEL.d);pendingDel=null;};
document.getElementById('mDelAll').onclick=()=>{if(pendingDel)doDelAll(pendingDel.rid);document.getElementById('delModal').classList.add('hidden');if(SEL&&isMob())openSheet(SEL.y,SEL.m,SEL.d);pendingDel=null;};

    const dt=new Date(now);dt.setDate(now.getDate()+i);
    const y=dt.getFullYear(),m=dt.getMonth(),d=dt.getDate();
    const key=fk(y,m,d),evs=sortEvs(EV[key]||[]),hol=getHol(y,m,d);
    if(!evs.length&&!hol)continue;
    hasAny=true;
    const grp=document.createElement('div');grp.className='ag-group';
    // Date label
    const lbl=document.createElement('div');
    const isT=isToday(y,m,d),isP=isPast(y,m,d);
    lbl.className='ag-date'+(isT?' today-lbl':'');
    let lblTxt=isT?'Today':WD[toMon(dt.getDay())]+', '+MONTHS[m]+' '+d;
    if(i<0&&!isT)lblTxt+=' (past)';
    lbl.textContent=lblTxt;
    if(hol){const hb=document.createElement('span');hb.className='ag-hday';hb.textContent='NL '+hol;lbl.appendChild(hb);}
    grp.appendChild(lbl);
    evs.forEach((ev,idx)=>{
      const cm=COLOR[ev.color]||COLOR.green;
      const item=document.createElement('div');item.className='ag-ev'+(isP?' past-ev':'');
      item.style.setProperty('--ec',cm.h);item.style.setProperty('--ecl',cm.l);
      const timeEl=document.createElement('div');timeEl.className='ag-ev-time';timeEl.textContent=ev.start?ev.start+(ev.end?' - '+ev.end:''):'All day';
      const info=document.createElement('div');info.className='ag-ev-info';
      const title=document.createElement('div');title.className='ag-ev-title';title.textContent=ev.title;
      if(ev.recurId){const rb=document.createElement('span');rb.className='ag-recur';rb.textContent='↺';title.appendChild(rb);}
      info.appendChild(title);
      if(ev.note){const note=document.createElement('div');note.className='ag-ev-note';note.textContent=ev.note;info.appendChild(note);}
      const badge=document.createElement('div');badge.className='ag-ev-badge';badge.style.setProperty('--ec',cm.h);badge.style.setProperty('--ecl',cm.l);badge.textContent=cm.n;
      item.appendChild(timeEl);item.appendChild(info);item.appendChild(badge);
      item.addEventListener('click',()=>{selDay(y,m,d);if(!isMob()){/* sidebar shows */}else{openSheet(y,m,d);}});
      grp.appendChild(item);
    });
    wrap.appendChild(grp);
  }
  if(!hasAny){const em=document.createElement('div');em.className='agenda-empty';em.innerHTML='<span>📭</span>No upcoming events.<br>Add some to your calendar!';wrap.appendChild(em);}
  p.appendChild(wrap);
}

// ===== SELECT DAY =====
function selDay(y,m,d){
  SEL={y,m,d};
  if(isMob()){render();openSheet(y,m,d);}
  else{cancelEdit();document.getElementById('sbDate').textContent=fmtDay(y,m,d);render();renderSidebar();}
}

// ===== MOBILE SHEET (events only) =====
function openSheet(y,m,d){
  const key=fk(y,m,d),evs=sortEvs(EV[key]||[]),hol=getHol(y,m,d);
  document.getElementById('shTitle').textContent=fmtDay(y,m,d);
  const body=document.getElementById('shBody');body.innerHTML='';
  if(hol){const hn=document.createElement('div');hn.className='sh-hday';hn.textContent='🇳🇱 '+hol;body.appendChild(hn);}
  if(evs.length){
    const list=document.createElement('div');list.className='sh-ev-list';
    evs.forEach(ev=>{
      const origIdx=EV[key].indexOf(ev);const cm=COLOR[ev.color]||COLOR.green;
      const item=document.createElement('div');item.className='sh-ev';item.style.setProperty('--ec',cm.h);item.style.setProperty('--ecl',cm.l);
      const info=document.createElement('div');info.className='sh-ev-info';
      const title=document.createElement('div');title.className='sh-ev-title';title.textContent=ev.title;
      const time=document.createElement('div');time.className='sh-ev-time';let ts=ev.start?(ev.end?ev.start+' - '+ev.end:ev.start):'All day';if(ev.note)ts+='  ·  '+ev.note;time.textContent=ts;
      info.appendChild(title);info.appendChild(time);
      const badge=document.createElement('div');badge.className='sh-ev-badge';badge.style.setProperty('--ec',cm.h);badge.style.setProperty('--ecl',cm.l);badge.textContent=cm.n;
      const acts=document.createElement('div');acts.className='sh-ev-acts';
      const eb=document.createElement('button');eb.className='sh-edit';eb.textContent='Edit';eb.addEventListener('click',e=>{e.stopPropagation();closeSheet();openAddSheet(y,m,d,origIdx);});
      const db=document.createElement('button');db.className='sh-del';db.innerHTML='&times;';
      db.addEventListener('click',e=>{e.stopPropagation();if(ev.recurId){pendingDel={key,idx:origIdx,rid:ev.recurId};document.getElementById('delModal').classList.remove('hidden');}else{EV[key].splice(origIdx,1);if(!EV[key].length)delete EV[key];save();render();openSheet(y,m,d);}});
      acts.appendChild(eb);acts.appendChild(db);
      item.appendChild(info);item.appendChild(badge);item.appendChild(acts);list.appendChild(item);
    });
    body.appendChild(list);
  } else {
    const em=document.createElement('div');em.className='sh-no-ev';em.innerHTML='<em>📭</em>No events on this day.<br>Tap <strong>+</strong> to add one.';body.appendChild(em);
  }
  document.getElementById('shOv').classList.add('on');document.getElementById('sheet').classList.add('on');document.body.style.overflow='hidden';
}

// ===== ADD/EDIT SHEET =====
function openAddSheet(y,m,d,editIdx){
  if(y===undefined){if(SEL){y=SEL.y;m=SEL.m;d=SEL.d;}else{y=TY;m=TM;d=TD;}}
  const key=fk(y,m,d),isEdit=editIdx!==undefined,ev2=isEdit?(EV[key]?.[editIdx]||{}):{};
  document.getElementById('shTitle').textContent=isEdit?'Edit Event':'New Event — '+fmtDay(y,m,d);
  const body=document.getElementById('shBody');body.innerHTML='';
  const ft=document.createElement('div');ft.className='sh-form-title';ft.textContent=isEdit?'Edit Event':'Add Event';body.appendChild(ft);
  if(isEdit){const ban=document.createElement('div');ban.className='sh-edit-banner';ban.textContent='Make your changes below';body.appendChild(ban);}
  const form=document.createElement('div');form.className='sh-form';
  // Title + emoji
  const tr=document.createElement('div');tr.className='sh-row2';
  const inp=document.createElement('input');inp.type='text';inp.placeholder='Event title *';inp.value=isEdit?(ev2.title||''):'';inp.style.flex='1';
  const epBtn=document.createElement('button');epBtn.type='button';epBtn.className='sh-emoji-btn';epBtn.innerHTML='&#128515;';epBtn.style.cssText='background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:0 14px;cursor:pointer;font-size:1.1rem;touch-action:manipulation;flex-shrink:0;';
  const ep=document.createElement('div');ep.className='ep-pop sheet-ep';ep.style.cssText='position:relative;top:0;left:0;right:0;width:100%;';
  epBtn.addEventListener('click',e=>{e.stopPropagation();ep.classList.toggle('open');if(ep.classList.contains('open')&&!ep.children.length){const g=document.createElement('div');g.className='ep-grid';EMOJIS.forEach(em=>{const b=document.createElement('div');b.className='ep-e';b.textContent=em;b.addEventListener('click',ex=>{ex.stopPropagation();inp.value+=em;inp.focus();ep.classList.remove('open');});g.appendChild(b);});ep.appendChild(g);}});
  tr.appendChild(inp);tr.appendChild(epBtn);form.appendChild(tr);form.appendChild(ep);
  // Times
  const trow=document.createElement('div');trow.className='sh-row2';const ts=document.createElement('input');ts.type='time';ts.value=isEdit?(ev2.start||''):'';const te=document.createElement('input');te.type='time';te.value=isEdit?(ev2.end||''):'';trow.appendChild(ts);trow.appendChild(te);form.appendChild(trow);
  const tn=document.createElement('textarea');tn.placeholder='Note (optional)';tn.value=isEdit?(ev2.note||''):'';form.appendChild(tn);
  // Repeat
  const repSel=document.createElement('select');['none','daily','weekly','monthly','yearly'].forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v==='none'?'No repeat':v.charAt(0).toUpperCase()+v.slice(1);if(isEdit&&ev2.repeat===v)o.selected=true;repSel.appendChild(o);});form.appendChild(repSel);
  // Reminder
  const remSel=document.createElement('select');[{v:'none',t:'No reminder'},{v:'15min',t:'15 min before'},{v:'1hr',t:'1 hr before'},{v:'1day',t:'1 day before'},{v:'1week',t:'1 week before'},{v:'custom',t:'Custom time...'}].forEach(({v,t})=>{const o=document.createElement('option');o.value=v;o.textContent=t;if(isEdit&&ev2.reminder===v)o.selected=true;remSel.appendChild(o);});form.appendChild(remSel);
  const remT=document.createElement('input');remT.type='time';remT.value=isEdit?(ev2.reminderTime||''):'';remT.placeholder='Reminder time';remT.style.display=(isEdit&&ev2.reminder==='custom')?'block':'none';
  remSel.addEventListener('change',()=>{remT.style.display=remSel.value==='custom'?'block':'none';});form.appendChild(remT);
  // Colors
  const cr=document.createElement('div');cr.className='sh-clr';const cl=document.createElement('div');cl.className='sh-clr-lbl';cl.textContent='Color / Priority';cr.appendChild(cl);
  const curC=isEdit?(ev2.color||'red'):'red';SELC=curC;
  Object.entries(COLOR).forEach(([k,v])=>{const sw=document.createElement('div');sw.className='sh-cs'+(k===curC?' on':'');sw.style.background=v.h;sw.dataset.c=k;sw.addEventListener('click',()=>{document.querySelectorAll('.sh-cs').forEach(s=>s.classList.remove('on'));sw.classList.add('on');SELC=k;});cr.appendChild(sw);});form.appendChild(cr);
  // Buttons
  const btns=document.createElement('div');btns.className='sh-btns';
  if(isEdit){const canc=document.createElement('button');canc.type='button';canc.className='sh-btn-cancel';canc.textContent='Cancel';canc.addEventListener('click',()=>{closeSheet();openSheet(y,m,d);});btns.appendChild(canc);}
  const sub=document.createElement('button');sub.type='button';sub.className='sh-btn-save';sub.textContent=isEdit?'Save Changes':'+ Add Event';
  sub.addEventListener('click',()=>{
    const t=inp.value.trim();if(!t){alert('Please enter a title.');return;}
    if(!EV[key])EV[key]=[];
    const obj={title:t,start:ts.value,end:te.value,note:tn.value.trim(),color:SELC,repeat:repSel.value,reminder:remSel.value,reminderTime:remSel.value==='custom'?remT.value:''};
    if(isEdit){EV[key][editIdx]=obj;}else{saveEv(key,obj);}
    storeReminder(obj,key);save();
    closeSheet();render();openSheet(y,m,d);
  });
  btns.appendChild(sub);form.appendChild(btns);body.appendChild(form);
  document.getElementById('shOv').classList.add('on');document.getElementById('sheet').classList.add('on');document.body.style.overflow='hidden';
  setTimeout(()=>{try{inp.focus();}catch(e){}},400);
}
function closeSheet(){document.getElementById('shOv').classList.remove('on');document.getElementById('sheet').classList.remove('on');document.body.style.overflow='';}

// ===== DESKTOP SIDEBAR =====
function renderSidebar(){
  if(!SEL)return;
  const{y,m,d}=SEL,key=fk(y,m,d),dayEvs=sortEvs(EV[key]||[]),list=document.getElementById('evList');
  list.innerHTML='';
  const hol=getHol(y,m,d);if(hol){const hn=document.createElement('div');hn.className='hday-notice';hn.textContent='🇳🇱 '+hol;list.appendChild(hn);}
  if(!dayEvs.length){const es=document.createElement('div');es.className='empty-s';es.textContent='No events — add one!';list.appendChild(es);return;}
  dayEvs.forEach(ev=>{
    const origIdx=EV[key].indexOf(ev);const cm=COLOR[ev.color]||COLOR.green;
    const item=document.createElement('div');item.className='ev-item';item.style.setProperty('--ec',cm.h);item.style.setProperty('--ecl',cm.l);
    const info=document.createElement('div');info.className='ev-info';
    const title=document.createElement('div');title.className='ev-title';if(ev.recurId){const ri=document.createElement('span');ri.style.cssText='font-size:0.6rem;color:var(--blue);background:var(--blue-l);border-radius:4px;padding:1px 5px;margin-right:4px;';ri.textContent='↺';title.appendChild(ri);}title.appendChild(document.createTextNode(ev.title));
    const time=document.createElement('div');time.className='ev-time';let ts=ev.start?(ev.end?ev.start+' - '+ev.end:ev.start):'All day';if(ev.note)ts+='  ·  '+ev.note;time.textContent=ts;
    info.appendChild(title);info.appendChild(time);
    const badge=document.createElement('div');badge.className='ev-badge';badge.style.setProperty('--ec',cm.h);badge.style.setProperty('--ecl',cm.l);badge.textContent=cm.n;
    const acts=document.createElement('div');acts.className='ev-acts';
    const eb=document.createElement('button');eb.className='ev-edit';eb.textContent='Edit';eb.addEventListener('click',e=>{e.stopPropagation();startEdit(key,origIdx);});
    const db=document.createElement('button');db.className='ev-del';db.innerHTML='&times;';db.addEventListener('click',e=>{e.stopPropagation();delEv(key,origIdx);});
    acts.appendChild(eb);acts.appendChild(db);item.appendChild(info);item.appendChild(badge);item.appendChild(acts);list.appendChild(item);
  });
}
function startEdit(key,idx){
  const ev=EV[key][idx];EK=key;EI=idx;
  document.getElementById('eTitle').value=ev.title;document.getElementById('eStart').value=ev.start||'';document.getElementById('eEnd').value=ev.end||'';document.getElementById('eNote').value=ev.note||'';
  document.getElementById('eRepeat').value=ev.repeat||'none';document.getElementById('eReminder').value=ev.reminder||'none';
  toggleReminderTime(ev.reminder||'none','deskRTime');document.getElementById('deskRTime').value=ev.reminderTime||'';
  document.querySelectorAll('.cs').forEach(s=>s.classList.toggle('on',s.dataset.c===ev.color));SELC=ev.color||'green';
  document.getElementById('sbTitle').textContent='Edit Event';document.getElementById('editBanner').style.display='block';
  document.getElementById('btnCancel').style.display='block';document.getElementById('btnSave').textContent='Save Changes';
  document.getElementById('eTitle').focus();document.querySelector('.sidebar').scrollTop=0;
}
function cancelEdit(){
  EK=null;EI=null;document.getElementById('sbTitle').textContent='Add Event';document.getElementById('editBanner').style.display='none';document.getElementById('btnCancel').style.display='none';document.getElementById('btnSave').textContent='+ Add Event';
  ['eTitle','eStart','eEnd','eNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('eRepeat').value='none';document.getElementById('eReminder').value='none';toggleReminderTime('none','deskRTime');document.getElementById('deskRTime').value='';
}
function submitDesk(){
  if(EK!==null&&EI!==null){const t=document.getElementById('eTitle').value.trim();if(!t){alert('Enter a title.');return;}const rv=document.getElementById('eReminder').value;EV[EK][EI]={...EV[EK][EI],title:t,start:document.getElementById('eStart').value,end:document.getElementById('eEnd').value,note:document.getElementById('eNote').value.trim(),color:SELC,repeat:document.getElementById('eRepeat').value,reminder:rv,reminderTime:rv==='custom'?(document.getElementById('deskRTime').value||''):''};storeReminder(EV[EK][EI],EK);save();cancelEdit();render();renderSidebar();return;}
  if(!SEL){alert('Select a day first.');return;}
  const t=document.getElementById('eTitle').value.trim();if(!t){alert('Enter a title.');return;}
  const key=fk(SEL.y,SEL.m,SEL.d),rv=document.getElementById('eReminder').value;
  const obj={title:t,start:document.getElementById('eStart').value,end:document.getElementById('eEnd').value,note:document.getElementById('eNote').value.trim(),color:SELC,repeat:document.getElementById('eRepeat').value,reminder:rv,reminderTime:rv==='custom'?(document.getElementById('deskRTime').value||''):''};
  saveEv(key,obj);storeReminder(obj,key);save();cancelEdit();render();renderSidebar();
}

// ===== NAV ACTIONS =====
function goToday(){CY=TY;CM=TM;CWS=getWS(TY,TM,TD);animRender();}

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}

// ===== INIT =====
loadFB().then(()=>{startSSE();initNotifs();loadWeather();});
</script>
